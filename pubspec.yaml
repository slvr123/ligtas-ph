name: disaster_awareness_app
description: "A new Flutter project."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: '>=3.3.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  geolocator: ^11.0.0  # For GPS location
  geocoding: ^3.0.0   # For address ↔ coordinates conversion
  # google_maps_flutter: ^2.5.0  # <-- REMOVED (needs API key)
  google_fonts: ^6.2.1
  url_launcher: ^6.2.5
  timeago: ^3.6.1

  http: ^1.1.0        # For fetching RSS feeds
  xml: ^6.3.0         # For parsing RSS XML
  cupertino_icons: ^1.0.8
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.8
  cloud_firestore: ^4.15.8

  # ⭐ --- ADDED FOR OPENSTREETMAP ---
  flutter_map: ^6.1.0 # For the free map view
  latlong2: ^0.9.0    # Helper for flutter_map coordinates
  # ⭐ --- END ADDED ---

  # sos button
  get: ^4.6.6
  vibration: ^3.1.4
  torch_light: ^1.1.0
  audioplayers: ^6.0.0

  #alerts
  firebase_messaging: ^14.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/audio/

